<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Craft - Fixed Delete & Mobile</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background-color: #87ceeb; touch-action: none; }
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 10px; height: 10px; border: 2px solid white; border-radius: 50%;
            transform: translate(-50%, -50%); pointer-events: none; z-index: 10;
        }
        #ui {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 10px; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 10px; z-index: 20;
        }
        .slot { width: 40px; height: 40px; border: 2px solid #555; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; border-radius: 5px; }
        .active { border-color: #fff; background: rgba(255,255,255,0.3); box-shadow: 0 0 10px #fff; }
        
        #instructions {
            position: absolute; top: 10px; left: 10px;
            color: white; background: rgba(0,0,0,0.6); padding: 12px; border-radius: 5px; font-size: 11px; pointer-events: none;
        }
        #menu {
            display: none; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.95); 
            padding: 30px; border-radius: 15px; width: 280px; box-shadow: 0 0 40px rgba(0,0,0,0.8); z-index: 100;
        }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); display: flex; justify-content: center; align-items: center;
            color: white; z-index: 50; cursor: pointer; font-size: 20px; text-align: center;
        }
        
        /* Mobile Controls */
        #joystick-wrapper { position: absolute; bottom: 40px; left: 40px; width: 100px; height: 100px; background: rgba(255,255,255,0.2); border-radius: 50%; display: none; z-index: 30; }
        #joystick-stick { position: absolute; top: 25px; left: 25px; width: 50px; height: 50px; background: white; border-radius: 50%; }
        #jump-btn { position: absolute; bottom: 120px; right: 40px; width: 60px; height: 60px; background: rgba(255,255,255,0.3); border: 2px solid white; border-radius: 50%; display: none; z-index: 30; color: white; align-items: center; justify-content: center; font-size: 10px; }
        #delete-mode-btn { position: absolute; bottom: 40px; right: 40px; width: 60px; height: 60px; background: rgba(255,0,0,0.3); border: 2px solid red; border-radius: 50%; display: none; z-index: 30; color: white; align-items: center; justify-content: center; font-size: 10px; }

        button { padding: 10px; cursor: pointer; border: none; border-radius: 6px; width: 100%; font-weight: bold; margin-top: 10px; }
        .resume-btn { background: #27ae60; color: white; }
    </style>
</head>
<body>

<div id="overlay">ចុចដើម្បីលេង (Click/Tap to Play)</div>
<div id="crosshair"></div>
<div id="instructions">
    <b>PC:</b> ឆ្វេង:ដាក់ | ស្តាំ:លុប | 1-4:ប្តូរប្លុក<br>
    <b>Phone:</b> ចុចប៊ូតុងក្រហមដើម្បីលុបប្លុក
</div>

<div id="joystick-wrapper"><div id="joystick-stick"></div></div>
<div id="jump-btn">JUMP</div>
<div id="delete-mode-btn">DELETE<br>OFF</div>

<div id="ui">
    <div id="s1" class="slot active" style="background-color: #2dcf5f;">1</div>
    <div id="s2" class="slot" style="background-color: #8b4513;">2</div>
    <div id="s3" class="slot" style="background-color: #808080;">3</div>
    <div id="s4" class="slot" style="background-color: #ffeb3b; color: black;">4</div>
</div>

<div id="menu">
    <h2 style="margin-top:0">ការកំណត់</h2>
    <label>ល្បឿនដើរ: <span id="speedVal">0.15</span></label>
    <input type="range" id="speedRange" min="0.05" max="0.5" step="0.01" value="0.15">
    <button class="resume-btn" id="resumeBtn">បន្តលេង</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/controls/PointerLockControls.js"></script>

<script>
    // --- Scene & Essentials ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87ceeb);
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const sun = new THREE.DirectionalLight(0xffffff, 1.2);
    sun.position.set(10, 20, 10);
    scene.add(sun);
    scene.add(new THREE.AmbientLight(0xffffff, 0.6));

    const geometry = new THREE.BoxGeometry(1, 1, 1);
    const materials = [
        new THREE.MeshLambertMaterial({ color: 0x2dcf5f }),
        new THREE.MeshLambertMaterial({ color: 0x8b4513 }),
        new THREE.MeshLambertMaterial({ color: 0x808080 }),
        new THREE.MeshLambertMaterial({ color: 0xffeb3b })
    ];
    let selectedMatIndex = 0;
    const objects = []; 
    let isDeleteMode = false; // For Mobile

    // --- 100x100 Map ---
    const mapSize = 100;
    const floorMesh = new THREE.InstancedMesh(geometry, materials[0], mapSize * mapSize);
    const matrix = new THREE.Matrix4();
    let idx = 0;
    for (let x = -50; x < 50; x++) {
        for (let z = -50; z < 50; z++) {
            matrix.setPosition(x, 0, z);
            floorMesh.setMatrixAt(idx, matrix);
            idx++;
        }
    }
    scene.add(floorMesh);
    objects.push(floorMesh);

    // --- Controls & Menu ---
    const controls = new THREE.PointerLockControls(camera, document.body);
    const overlay = document.getElementById('overlay');
    const menu = document.getElementById('menu');
    
    overlay.onclick = () => {
        if (!/Android|iPhone/i.test(navigator.userAgent)) {
            controls.lock();
        } else {
            overlay.style.display = 'none';
            document.getElementById('joystick-wrapper').style.display = 'block';
            document.getElementById('jump-btn').style.display = 'flex';
            document.getElementById('delete-mode-btn').style.display = 'flex';
        }
    };

    controls.addEventListener('lock', () => { overlay.style.display = 'none'; menu.style.display = 'none'; });
    controls.addEventListener('unlock', () => { if(overlay.style.display === 'none') menu.style.display = 'block'; });
    document.getElementById('resumeBtn').onclick = () => controls.lock();

    // --- Interaction (Place & Delete) ---
    window.addEventListener('mousedown', (e) => {
        if (!controls.isLocked) return;
        handleAction(e.button === 0 ? 'place' : 'delete');
    });

    // Mobile Delete Button Toggle
    document.getElementById('delete-mode-btn').onclick = (e) => {
        e.stopPropagation();
        isDeleteMode = !isDeleteMode;
        const btn = document.getElementById('delete-mode-btn');
        btn.innerHTML = isDeleteMode ? "DELETE<br>ON" : "DELETE<br>OFF";
        btn.style.background = isDeleteMode ? "rgba(255,0,0,0.8)" : "rgba(255,0,0,0.3)";
    };

    document.addEventListener('touchstart', (e) => {
        if (e.target.id === 'jump-btn') { velocityY = 0.25; return; }
        if (e.target.id === 'delete-mode-btn') return;
        if (e.touches.length === 1 && e.target.tagName === 'CANVAS') {
            handleAction(isDeleteMode ? 'delete' : 'place');
        }
    }, {passive: false});

    function handleAction(type) {
        const raycaster = new THREE.Raycaster();
        raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
        const intersects = raycaster.intersectObjects(objects);

        if (intersects.length > 0) {
            const intersect = intersects[0];
            if (type === 'place') {
                const b = new THREE.Mesh(geometry, materials[selectedMatIndex]);
                const pos = intersect.point.clone().add(intersect.face.normal.clone().multiplyScalar(0.5));
                b.position.set(Math.round(pos.x), Math.round(pos.y), Math.round(pos.z));
                scene.add(b);
                objects.push(b);
            } else if (type === 'delete') {
                // Prevent deleting the floor instance mesh
                if (intersect.object !== floorMesh) {
                    scene.remove(intersect.object);
                    objects.splice(objects.indexOf(intersect.object), 1);
                }
            }
        }
    }

    // --- Mobile Joystick & Look ---
    let moveF = 0, moveR = 0, lastX, lastY;
    const joyStick = document.getElementById('joystick-stick');
    document.getElementById('joystick-wrapper').addEventListener('touchmove', (e) => {
        const rect = e.currentTarget.getBoundingClientRect();
        const centerX = rect.left + rect.width/2;
        const centerY = rect.top + rect.height/2;
        const dx = e.touches[0].clientX - centerX;
        const dy = e.touches[0].clientY - centerY;
        const dist = Math.min(Math.sqrt(dx*dx + dy*dy), 30);
        const angle = Math.atan2(dy, dx);
        joyStick.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`;
        moveF = -Math.sin(angle) * (dist/30);
        moveR = Math.cos(angle) * (dist/30);
    });
    document.getElementById('joystick-wrapper').addEventListener('touchend', () => {
        joyStick.style.transform = `translate(0,0)`; moveF = 0; moveR = 0;
    });

    document.addEventListener('touchmove', (e) => {
        if (e.target.tagName !== 'CANVAS') return;
        const t = e.touches[0];
        if (lastX && lastY) {
            camera.rotation.y -= (t.clientX - lastX) * 0.005;
            camera.rotation.x -= (t.clientY - lastY) * 0.005;
        }
        lastX = t.clientX; lastY = t.clientY;
    });
    document.addEventListener('touchend', () => { lastX = null; lastY = null; });

    // --- PC Keys ---
    let keys = {};
    document.onkeydown = (e) => {
        keys[e.code] = true;
        if (e.code.includes('Digit')) {
            const num = parseInt(e.key);
            if (num >= 1 && num <= 4) {
                selectedMatIndex = num - 1;
                document.querySelectorAll('.slot').forEach(s => s.classList.remove('active'));
                document.getElementById('s' + num).classList.add('active');
            }
        }
    };
    document.onkeyup = (e) => keys[e.code] = false;

    // --- Main Loop ---
    let velocityY = 0;
    camera.position.set(0, 5, 10);

    function animate() {
        requestAnimationFrame(animate);
        let speed = parseFloat(document.getElementById('speedRange').value);
        document.getElementById('speedVal').innerText = speed;

        if (controls.isLocked) {
            let s = keys['ShiftLeft'] ? speed * 2 : speed;
            if (keys['KeyW']) controls.moveForward(s);
            if (keys['KeyS']) controls.moveForward(-s);
            if (keys['KeyA']) controls.moveRight(-s);
            if (keys['KeyD']) controls.moveRight(s);
        }
        if (moveF || moveR) {
            camera.translateZ(-moveF * speed);
            camera.translateX(moveR * speed);
        }

        velocityY -= 0.008;
        camera.position.y += velocityY;
        if (camera.position.y < 2.5) { camera.position.y = 2.5; velocityY = 0; }
        if (keys['Space'] && camera.position.y === 2.5) velocityY = 0.22;

        renderer.render(scene, camera);
    }
    animate();
    window.oncontextmenu = (e) => e.preventDefault();
</script>
</body>
</html>
