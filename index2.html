<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <title>My Craft - Large Map Full Version</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background-color: #87ceeb; }
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 10px; height: 10px; border: 2px solid white; border-radius: 50%;
            transform: translate(-50%, -50%); pointer-events: none; z-index: 10;
        }
        #ui {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 10px; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 10px;
        }
        .slot { width: 45px; height: 45px; border: 2px solid #555; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; border-radius: 5px; }
        .active { border-color: #fff; background: rgba(255,255,255,0.3); box-shadow: 0 0 10px #fff; }
        
        #instructions {
            position: absolute; top: 10px; left: 10px;
            color: white; background: rgba(0,0,0,0.6); padding: 12px; border-radius: 5px; font-size: 13px; pointer-events: none;
        }
        #menu {
            display: none; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.95); 
            padding: 30px; border-radius: 15px; width: 300px; box-shadow: 0 0 40px rgba(0,0,0,0.8); z-index: 100;
        }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center;
            color: white; z-index: 50; cursor: pointer; font-size: 24px;
        }
        button { padding: 10px; cursor: pointer; border: none; border-radius: 6px; width: 100%; font-weight: bold; margin-top: 10px; }
        .resume-btn { background: #27ae60; color: white; }
    </style>
</head>
<body>

<div id="overlay">ចុចទីនេះដើម្បីចាប់ផ្តើម (Click to Start)</div>

<div id="crosshair"></div>
<div id="instructions">
    <b>របៀបលេង:</b><br>
    • 1, 2, 3, 4: ប្តូរប្រភេទប្លុក<br>
    • SHIFT: រត់លឿន | SPACE: លោត<br>
    • ឆ្វេង: ដាក់ប្លុក | ស្តាំ: លុបប្លុក<br>
    • ESC: បើកការកំណត់ (Settings)
</div>

<div id="ui">
    <div id="s1" class="slot active" style="background-color: #2dcf5f;">1</div>
    <div id="s2" class="slot" style="background-color: #8b4513;">2</div>
    <div id="s3" class="slot" style="background-color: #808080;">3</div>
    <div id="s4" class="slot" style="background-color: #ffeb3b; color: black;">4</div>
</div>

<div id="menu">
    <h2 style="margin-top:0">ការកំណត់</h2>
    <label>ល្បឿនដើរ: <span id="speedVal">0.15</span></label>
    <input type="range" id="speedRange" min="0.05" max="0.5" step="0.01" value="0.15">
    <button class="resume-btn" id="resumeBtn">បន្តលេង</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/controls/PointerLockControls.js"></script>

<script>
    // --- Scene Setup ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87ceeb);
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const sun = new THREE.DirectionalLight(0xffffff, 1.2);
    sun.position.set(10, 20, 10);
    scene.add(sun);
    scene.add(new THREE.AmbientLight(0xffffff, 0.6));

    const geometry = new THREE.BoxGeometry(1, 1, 1);
    const materials = [
        new THREE.MeshLambertMaterial({ color: 0x2dcf5f }), // Grass
        new THREE.MeshLambertMaterial({ color: 0x8b4513 }), // Dirt
        new THREE.MeshLambertMaterial({ color: 0x808080 }), // Stone
        new THREE.MeshLambertMaterial({ color: 0xffeb3b })  // Wood/Gold
    ];
    let selectedMatIndex = 0;
    const objects = []; 

    // --- INSTANCED LARGE MAP (100x100) ---
    const mapSize = 100;
    const totalBlocks = mapSize * mapSize;
    const floorMesh = new THREE.InstancedMesh(geometry, materials[0], totalBlocks);
    const matrix = new THREE.Matrix4();
    let idx = 0;
    for (let x = -mapSize/2; x < mapSize/2; x++) {
        for (let z = -mapSize/2; z < mapSize/2; z++) {
            matrix.setPosition(x, 0, z);
            floorMesh.setMatrixAt(idx, matrix);
            idx++;
        }
    }
    scene.add(floorMesh);
    objects.push(floorMesh);

    // --- Controls ---
    const controls = new THREE.PointerLockControls(camera, document.body);
    const menu = document.getElementById('menu');
    const overlay = document.getElementById('overlay');
    
    overlay.onclick = () => controls.lock();
    document.getElementById('resumeBtn').onclick = () => controls.lock();

    controls.addEventListener('lock', () => {
        menu.style.display = 'none';
        overlay.style.display = 'none';
    });
    controls.addEventListener('unlock', () => {
        menu.style.display = 'block';
    });

    // --- Interaction ---
    window.addEventListener('mousedown', (e) => {
        if (!controls.isLocked) return;
        const raycaster = new THREE.Raycaster();
        raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
        const intersects = raycaster.intersectObjects(objects);

        if (intersects.length > 0) {
            const intersect = intersects[0];
            if (e.button === 0) { // Left Click: Place
                const b = new THREE.Mesh(geometry, materials[selectedMatIndex]);
                const pos = intersect.point.clone().add(intersect.face.normal.clone().multiplyScalar(0.5));
                b.position.set(Math.round(pos.x), Math.round(pos.y), Math.round(pos.z));
                scene.add(b);
                objects.push(b);
            } else if (e.button === 2) { // Right Click: Remove
                if (intersect.object !== floorMesh) {
                    scene.remove(intersect.object);
                    objects.splice(objects.indexOf(intersect.object), 1);
                }
            }
        }
    });

    // --- Key Logic ---
    let keys = {};
    document.onkeydown = (e) => {
        keys[e.code] = true;
        if (e.code.includes('Digit')) {
            const num = parseInt(e.key) - 1;
            if (num >= 0 && num <= 3) {
                selectedMatIndex = num;
                document.querySelectorAll('.slot').forEach(s => s.classList.remove('active'));
                document.getElementById('s' + (num + 1)).classList.add('active');
            }
        }
    };
    document.onkeyup = (e) => keys[e.code] = false;

    // --- Animation & Physics ---
    let velocityY = 0;
    let canJump = false;
    camera.position.set(0, 5, 10);

    function animate() {
        requestAnimationFrame(animate);
        
        if (controls.isLocked) {
            let baseSpeed = parseFloat(document.getElementById('speedRange').value);
            document.getElementById('speedVal').innerText = baseSpeed;
            let actualSpeed = keys['ShiftLeft'] ? baseSpeed * 2.2 : baseSpeed;

            if (keys['KeyW']) controls.moveForward(actualSpeed);
            if (keys['KeyS']) controls.moveForward(-actualSpeed);
            if (keys['KeyA']) controls.moveRight(-actualSpeed);
            if (keys['KeyD']) controls.moveRight(actualSpeed);

            // Gravity & Ground
            velocityY -= 0.008;
            camera.position.y += velocityY;

            if (camera.position.y < 2.5) {
                camera.position.y = 2.5;
                velocityY = 0;
                canJump = true;
            }

            if (keys['Space'] && canJump) {
                velocityY = 0.2;
                canJump = false;
            }
        }
        renderer.render(scene, camera);
    }
    animate();

    window.oncontextmenu = (e) => e.preventDefault();
</script>
</body>
</html>
